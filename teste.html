<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<title>Calc3DPro</title>

<style>
:root{
  --bg:#000000;
  --card:#1c1c1e;
  --card2:#2c2c2e;
  --text:#ffffff;
  --muted:#8e8e93;
  --blue:#0a84ff;
  --green:#30d158;
  --red:#ff453a;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.wrap{
  max-width:430px;
  margin:auto;
  padding:14px;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:14px;
  margin-bottom:12px;
}

label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin:8px 0 4px;
}

input,
select,
button{
  width:100%;
  max-width:100%;
  box-sizing:border-box;
  padding:12px;
  border:none;
  border-radius:14px;
  background:var(--card2);
  color:var(--text);
  font-size:16px;
}

button{
  font-weight:700;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:10px;
}

.blue{
  background:var(--blue);
}

.green{
  background:var(--green);
}

.red{
  background:var(--red);
}

.result{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:8px 0;
  border-bottom:1px solid #333;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.footer{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  padding:8px;
}

#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

#modalBox{
  width:100%;
  max-width:380px;
  background:var(--card);
  border-radius:24px;
  padding:16px;
  overflow:hidden;
}
</style>
</head>

<body>
<div class="wrap">

  <div class="card">
    <label>Nome da peça</label>
    <input id="nome" placeholder="Ex: Suporte celular">

    <div class="grid">
      <div>
        <label>Filamento</label>
        <select id="filSel"></select>
      </div>

      <div>
        <label>Impressora</label>
        <select id="impSel"></select>
      </div>
    </div>

    <div class="grid">
      <div>
        <label>Gramas usadas</label>
        <input id="gramas" type="number" placeholder="0">
      </div>

      <div>
        <label>Horas</label>
        <input id="horas" type="number" placeholder="0">
      </div>

      <div>
        <label>Valor kWh</label>
        <input id="kwh" type="number" value="0.72">
      </div>

      <div>
        <label>Lucro %</label>
        <input id="lucro" type="number" value="200">
      </div>
    </div>

    <div class="btns">
      <button class="blue" onclick="calcular()">Calcular</button>
      <button class="green" onclick="salvarOrcamento()">Salvar</button>
    </div>
  </div>

  <div class="card">
    <div id="resultado"></div>
  </div>

  <div class="card">
    <div class="grid">
      <button class="blue" onclick="abrirModal('filamento')">+ Filamento</button>
      <button class="blue" onclick="abrirModal('impressora')">+ Impressora</button>
    </div>
  </div>

  <div class="card">
    <div class="small" style="margin-bottom:8px;">Histórico</div>
    <div id="historico"></div>
  </div>

  <div class="footer">
    Versão: 2.5.1
  </div>

</div>

<!-- Modal -->
<div id="modal">
  <div id="modalBox">

    <h3 id="modalTitulo"></h3>

    <input id="campo1">
    <input id="campo2">

    <div class="btns">
      <button class="red" onclick="fecharModal()">Cancelar</button>
      <button class="green" onclick="salvarCadastro()">Salvar</button>
    </div>

  </div>
</div>

<script>
const APP_VERSION = "2.5.1";

let tipoCadastro = "";
let ultimoCalculo = null;

/* =========================
   Inicialização
========================= */
function iniciar(){
  if(!localStorage.getItem("filamentos")){
    localStorage.setItem(
      "filamentos",
      JSON.stringify([
        { nome:"PLA", valor:99 },
        { nome:"PETG", valor:129 }
      ])
    );
  }

  if(!localStorage.getItem("impressoras")){
    localStorage.setItem(
      "impressoras",
      JSON.stringify([
        { nome:"A1 Mini", consumo:65 },
        { nome:"Ender 3", consumo:120 }
      ])
    );
  }

  if(!localStorage.getItem("historico")){
    localStorage.setItem("historico","[]");
  }

  carregarSelects();
  renderHistorico();
}

/* =========================
   Utilidades
========================= */
function moeda(valor){
  return valor.toLocaleString(
    "pt-BR",
    {
      style:"currency",
      currency:"BRL"
    }
  );
}

/* =========================
   Carregar selects
========================= */
function carregarSelects(){

  const filamentos =
    JSON.parse(localStorage.getItem("filamentos"));

  const impressoras =
    JSON.parse(localStorage.getItem("impressoras"));

  filSel.innerHTML =
    filamentos.map(item =>
      `<option value="${item.valor}">
        ${item.nome} - R$${item.valor}
      </option>`
    ).join("");

  impSel.innerHTML =
    impressoras.map(item =>
      `<option value="${item.consumo}">
        ${item.nome} - ${item.consumo}W
      </option>`
    ).join("");
}

/* =========================
   Calcular
========================= */
function calcular(){

  const valorKg =
    parseFloat(filSel.value || 0);

  const gramas =
    parseFloat(
      document.getElementById("gramas").value || 0
    );

  const horas =
    parseFloat(
      document.getElementById("horas").value || 0
    );

  const consumo =
    parseFloat(impSel.value || 0);

  const kwh =
    parseFloat(
      document.getElementById("kwh").value || 0
    );

  const lucro =
    parseFloat(
      document.getElementById("lucro").value || 0
    );

  const custoFilamento =
    (valorKg / 1000) * gramas;

  const custoEnergia =
    (consumo / 1000) * horas * kwh;

  const custoTotal =
    custoFilamento + custoEnergia;

  const venda =
    custoTotal + (custoTotal * lucro / 100);

  ultimoCalculo = {
    nome:
      document.getElementById("nome").value ||
      "Peça sem nome",
    custo:custoTotal,
    venda:venda
  };

  resultado.innerHTML = `
    <div class="result">
      <span>Custo</span>
      <b>${moeda(custoTotal)}</b>
    </div>

    <div class="result">
      <span>Venda</span>
      <b>${moeda(venda)}</b>
    </div>
  `;
}

/* =========================
   Salvar orçamento
========================= */
function salvarOrcamento(){

  calcular();

  let lista =
    JSON.parse(localStorage.getItem("historico"));

  lista.unshift(ultimoCalculo);

  localStorage.setItem(
    "historico",
    JSON.stringify(lista)
  );

  renderHistorico();
}

/* =========================
   Histórico
========================= */
function renderHistorico(){

  const lista =
    JSON.parse(localStorage.getItem("historico"));

  if(lista.length === 0){
    historico.innerHTML =
      "<div class='small'>Nenhum orçamento salvo</div>";
    return;
  }

  historico.innerHTML =
    lista.map(item => `
      <div class="result">
        <span>${item.nome}</span>
        <b>${moeda(item.venda)}</b>
      </div>
    `).join("");
}

/* =========================
   Modal
========================= */
function abrirModal(tipo){

  tipoCadastro = tipo;

  modal.style.display = "flex";

  campo1.value = "";
  campo2.value = "";

  if(tipo === "filamento"){
    modalTitulo.textContent =
      "Novo Filamento";

    campo1.placeholder = "Nome";
    campo2.placeholder = "Valor";
    campo2.type = "number";
  }

  if(tipo === "impressora"){
    modalTitulo.textContent =
      "Nova Impressora";

    campo1.placeholder = "Modelo";
    campo2.placeholder = "Consumo em watts";
    campo2.type = "number";
  }
}

function fecharModal(){
  modal.style.display = "none";
}

/* =========================
   Salvar cadastro
========================= */
function salvarCadastro(){

  const a = campo1.value.trim();
  const b = campo2.value.trim();

  if(!a || !b){
    alert("Preencha todos os campos");
    return;
  }

  if(tipoCadastro === "filamento"){

    let lista =
      JSON.parse(
        localStorage.getItem("filamentos")
      );

    lista.push({
      nome:a,
      valor:parseFloat(b)
    });

    localStorage.setItem(
      "filamentos",
      JSON.stringify(lista)
    );
  }

  if(tipoCadastro === "impressora"){

    let lista =
      JSON.parse(
        localStorage.getItem("impressoras")
      );

    lista.push({
      nome:a,
      consumo:parseFloat(b)
    });

    localStorage.setItem(
      "impressoras",
      JSON.stringify(lista)
    );
  }

  carregarSelects();
  fecharModal();
}

/* ========================= */
iniciar();
</script>
</body>
</html>
