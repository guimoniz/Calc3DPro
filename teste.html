<!DOCTYPE html><html lang='pt-BR'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><meta name='theme-color' content='#000'><title>Calc 3D Pro</title><style>:root{--bg:#000;--card:#1c1c1e;--card2:#2c2c2e;--txt:#fff;--muted:#999;--blue:#0a84ff;--green:#30d158;--red:#ff453a}*{box-sizing:border-box}body{margin:0;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif}.wrap{max-width:430px;margin:auto;padding:14px}.card{background:var(--card);border-radius:22px;padding:14px;margin-bottom:12px}label{font-size:12px;color:var(--muted);display:block;margin:8px 0 4px}input,select{width:100%;padding:12px;border:none;border-radius:14px;background:var(--card2);color:#fff}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px}.btn{padding:12px;border:none;border-radius:14px;color:#fff;font-weight:700}.blue{background:var(--blue)}.green{background:var(--green)}.red{background:var(--red)}.result{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #333}.footer{text-align:center;font-size:12px;color:#999;padding:8px}</style></head><body><div class='wrap'><div class='card'><label>Nome da peça</label><input id='nome'><div class='grid'><div><label>Filamento</label><select id='filSel'></select></div><div><label>Impressora</label><select id='impSel'></select></div></div><div class='grid'><div><label>Gramas usadas</label><input id='g' type='number'></div><div><label>Horas</label><input id='h' type='number'></div><div><label>kWh</label><input id='k' type='number' value='0.72'></div><div><label>Lucro %</label><input id='l' type='number' value='200'></div></div><div class='btns'><button class='btn blue' onclick='calc()'>Calcular</button><button class='btn green' onclick='salvar()'>Salvar</button></div></div><div class='card'><div id='res'></div></div><div class='card'><div class='btns'><button class='btn blue' onclick='novoFil()'>+ Filamento</button><button class='btn blue' onclick='novaImp()'>+ Impressora</button></div></div><div class='card'><div id='hist'></div></div><div class='footer' id='ver'></div></div><script>const APP_VERSION='2.4 Clean Stable';function br(n){return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}function init(){if(!localStorage.fils)localStorage.fils=JSON.stringify([{n:'PLA',v:99}]);if(!localStorage.imps)localStorage.imps=JSON.stringify([{n:'A1 Mini',v:65}]);carregar();document.getElementById('ver').textContent='Versão: '+APP_VERSION;renderHist()}function carregar(){let fs=JSON.parse(localStorage.fils),is=JSON.parse(localStorage.imps);filSel.innerHTML=fs.map(x=>'<option value='+x.v+'>'+x.n+' - R$'+x.v+'</option>').join('');impSel.innerHTML=is.map(x=>'<option value='+x.v+'>'+x.n+' - '+x.v+'W</option>').join('')}function calc(){let fil=parseFloat(filSel.value||0),g=parseFloat(g.value||0),h=parseFloat(h.value||0),w=parseFloat(impSel.value||0),k=parseFloat(k.value||0.72),l=parseFloat(l.value||200);let custo=(fil/1000*g)+((w/1000)*h*k);let venda=custo+(custo*l/100);res.innerHTML='<div class=result><span>Custo</span><b>'+br(custo)+'</b></div><div class=result><span>Venda</span><b>'+br(venda)+'</b></div>';window.last={nome:nome.value,custo,venda}}function salvar(){calc();let arr=JSON.parse(localStorage.orc||'[]');arr.unshift(window.last);localStorage.orc=JSON.stringify(arr);renderHist()}function renderHist(){let arr=JSON.parse(localStorage.orc||'[]');hist.innerHTML=arr.map((x,i)=>'<div class=result><span>'+x.nome+'</span><b>'+br(x.venda)+'</b></div>').join('')||'Sem histórico'}function novoFil(){let n=prompt('Nome');if(!n)return;let v=prompt('Valor');if(!v)return;let a=JSON.parse(localStorage.fils);a.push({n:n,v:v});localStorage.fils=JSON.stringify(a);carregar()}function novaImp(){let n=prompt('Modelo');if(!n)return;let v=prompt('Consumo');if(!v)return;let a=JSON.parse(localStorage.imps);a.push({n:n,v:v});localStorage.imps=JSON.stringify(a);carregar()}init();</script></body></html>
