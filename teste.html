<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#000000">
<title>Calc3DPro</title>

<style>
:root{
  --bg:#000000;
  --card:#1c1c1e;
  --card2:#2c2c2e;
  --text:#ffffff;
  --muted:#8e8e93;
  --blue:#0a84ff;
  --green:#30d158;
  --red:#ff453a;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

.wrap{
  max-width:430px;
  margin:auto;
  padding:14px;
}

.card{
  background:var(--card);
  border-radius:22px;
  padding:14px;
  margin-bottom:12px;
}

label{
  display:block;
  font-size:12px;
  color:var(--muted);
  margin:8px 0 4px;
}

input,
select,
button{
  width:100%;
  max-width:100%;
  padding:12px;
  min-height:48px;
  border:none;
  border-radius:14px;
  background:var(--card2);
  color:var(--text);
  font-size:16px;
}

button{
  font-weight:700;
  cursor:pointer;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

.btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}

.blue{
  background:var(--blue);
}

.green{
  background:var(--green);
}

.red{
  background:var(--red);
}

.result{
  display:flex;
  justify-content:space-between;
  gap:10px;
  padding:8px 0;
  border-bottom:1px solid #333;
}

.small{
  font-size:12px;
  color:var(--muted);
}

.footer{
  text-align:center;
  color:var(--muted);
  font-size:12px;
  padding:8px;
}

/* MODAL */

#modal{
  display:none;
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.55);
  align-items:center;
  justify-content:center;
  padding:20px;
  z-index:999;
}

#modalBox{
  width:100%;
  max-width:380px;
  background:var(--card);
  border-radius:24px;
  padding:18px;
}

#modalTitulo{
  margin:0 0 14px 0;
  font-size:20px;
}

.modal-field{
  margin-bottom:12px;
}

.modal-field input{
  margin:0;
}
</style>
</head>

<body>

<div class="wrap">

  <div class="card">
    <label>Nome da peça</label>
    <input id="nome">

    <div class="grid">
      <div>
        <label>Filamento</label>
        <select id="filSel"></select>
      </div>

      <div>
        <label>Impressora</label>
        <select id="impSel"></select>
      </div>
    </div>

    <div class="grid">
      <div>
        <label>Gramas usadas</label>
        <input id="gramas" type="number">
      </div>

      <div>
        <label>Horas</label>
        <input id="horas" type="number">
      </div>

      <div>
        <label>Valor kWh</label>
        <input id="kwh" type="number" value="0.72">
      </div>

      <div>
        <label>Lucro %</label>
        <input id="lucro" type="number" value="200">
      </div>
    </div>

    <div class="btns">
      <button class="blue" onclick="calcular()">Calcular</button>
      <button class="green" onclick="salvarOrcamento()">Salvar</button>
    </div>
  </div>

  <div class="card">
    <div id="resultado"></div>
  </div>

  <div class="card">
    <div class="grid">
      <button class="blue" onclick="abrirModal('filamento')">+ Filamento</button>
      <button class="blue" onclick="abrirModal('impressora')">+ Impressora</button>
    </div>
  </div>

  <div class="card">
    <div class="small" style="margin-bottom:8px;">Histórico</div>
    <div id="historico"></div>
  </div>

  <div class="footer" id="rodapeVersao">
  </div>

</div>

<!-- MODAL -->

<div id="modal">
  <div id="modalBox">

    <h3 id="modalTitulo"></h3>

    <div class="modal-field">
      <input id="campo1">
    </div>

    <div class="modal-field">
      <input id="campo2">
    </div>

    <div class="btns">
      <button class="red" onclick="fecharModal()">Cancelar</button>
      <button class="green" onclick="salvarCadastro()">Salvar</button>
    </div>

  </div>
</div>

<script>
/* =========================
   CONFIGURAÇÃO INICIAL
========================= */
const APP_VERSION = "2.6";

/* =========================
   INICIALIZAÇÃO
========================= */
window.onload = function(){
  document.getElementById("rodapeVersao").innerHTML =
    "Versão: " + APP_VERSION;
};

/* =========================
   MODAL
========================= */
function abrirModal(tipo){

  modal.style.display = "flex";

  campo1.value = "";
  campo2.value = "";

  if(tipo === "filamento"){
    modalTitulo.textContent = "Novo Filamento";
    campo1.placeholder = "Nome";
    campo2.placeholder = "Valor";
  }

  if(tipo === "impressora"){
    modalTitulo.textContent = "Nova Impressora";
    campo1.placeholder = "Modelo";
    campo2.placeholder = "Consumo em watts";
  }
}

function fecharModal(){
  modal.style.display = "none";
}

function salvarCadastro(){
  fecharModal();
}

/* placeholders do restante */
function calcular(){}
function salvarOrcamento(){}
</script>

</body>
</html>
