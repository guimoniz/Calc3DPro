<!DOCTYPE html>
<html lang="pt-BR">
<head>
<link rel="apple-touch-icon" href="icon.png">
<link rel="manifest" href="manifest.json">
<meta charset="UTF-8">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Calc 3D Pro">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Calculadora 3D</title>
<style>
:root{--bg:#000;--glass:rgba(28,28,30,.78);--card2:#2c2c2e;--txt:#fff;--muted:#98989d;--accent:#0a84ff;--green:#30d158;--red:#ff453a;--shadow:0 12px 30px rgba(0,0,0,.35)}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;background:radial-gradient(circle at top,#151515,#000 55%);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif}body{min-height:100vh}.wrap{max-width:430px;margin:0 auto;padding:env(safe-area-inset-top) 14px calc(30px + env(safe-area-inset-bottom))}.hero{padding:8px 4px 14px}.hero h1{margin:6px 0 2px;font-size:32px}.sub{color:var(--muted);font-size:13px}.card{background:var(--glass);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.05);border-radius:24px;padding:14px;margin:12px 0;box-shadow:var(--shadow)}label{display:block;font-size:12px;color:var(--muted);margin:0 0 6px 2px}input,select{width:100%;padding:13px 14px;border:none;border-radius:16px;background:var(--card2);color:#fff;font-size:16px;outline:none}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.btns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}.btn{padding:13px;border:none;border-radius:16px;color:#fff;background:var(--accent);font-weight:700}.btn.alt{background:#3a3a3c}.btn.green{background:var(--green)}.result{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.06)}.result:last-child{border-bottom:none}.small{font-size:12px;color:var(--muted)}.saved .item{background:var(--card2);border-radius:18px;padding:12px;margin-top:10px}.row{display:flex;justify-content:space-between;gap:8px;align-items:center}.mini button{margin-right:6px;padding:8px 10px;border:none;border-radius:10px;background:#30d158;color:#fff}.badge{display:inline-block;padding:6px 10px;border-radius:999px;background:#111;font-size:12px}.highlight{font-size:26px;font-weight:800}.footer{text-align:center;color:var(--muted);font-size:11px;margin-top:10px}
#splash{position:fixed;inset:0;background:radial-gradient(circle at top,#1a1a1a,#000 60%);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:9999;transition:opacity .6s ease}.logo{width:110px;height:110px;border-radius:26px;box-shadow:0 20px 40px rgba(0,0,0,.45);animation:pop 1s ease}.pulse{margin-top:18px;color:#fff;font-weight:700;letter-spacing:.02em}.spinner{margin-top:10px;width:26px;height:26px;border:3px solid rgba(255,255,255,.18);border-top-color:#0a84ff;border-radius:50%;animation:spin 1s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes pop{0%{transform:scale(.75);opacity:0}100%{transform:scale(1);opacity:1}}
</style>
</head><body><div id='splash'><img src='icon.png' class='logo'><div class='pulse'>Calc 3D Pro</div><div class='spinner'></div></div><div class='wrap'>
<h1>Calculadora 3D</h1>
<div class='card'>
<label>Nome da peça</label><input id='nome' placeholder='Ex. Suporte de celular'><div class='grid' style='margin-top:10px'><div><label>Filamento</label><select id='perfilFil'></select><div class='btns' style='margin-top:6px'><button class='btn alt' onclick='novoFilamento()'>+ Filamento</button><button class='btn green' onclick='gerirFilamentos()'>Gerenciar</button></div></div><div><label>Impressora</label><select id='perfilImp'></select><div class='btns' style='margin-top:6px'><button class='btn alt' onclick='novaImpressora()'>+ Impressora</button><button class='btn green' onclick='gerirImpressoras()'>Gerenciar</button></div></div></div>
<div class='grid'>
<div><label>Valor filamento (R$)</label><input id='fil' type='number' step='0.01' value='99'></div>
<div><label>Gramas usadas</label><input id='g' type='number' step='0.01'></div>
<div><label>Horas impressão</label><input id='h' type='number' step='0.01'></div>
<div><label>Watts</label><input id='w' type='number' step='0.01' value='65'></div>
<div><label>kWh (R$)</label><input id='k' type='number' step='0.01' value='0.72'></div>
<div><label>Deprec./hora (R$)</label><input id='d' type='number' step='0.01' value='0.50'></div>
<div><label>Outros custos (R$)</label><input id='o' type='number' step='0.01' value='0'></div>
<div><label>Lucro (%)</label><input id='l' type='number' step='0.01' value='200'></div>
</div>
</div>
<div class='card' id='res'></div><div class='card'><div class='small'>Preço sugerido</div><div id='heroTotal' class='highlight'>R$ 0,00</div></div>
<div class='btns'><button class='btn' onclick='calc()'>Calcular</button><button class='btn alt' onclick='limpar()'>Limpar</button><button class='btn green' onclick='salvar()'>Salvar</button></div>
<div class='card saved'><input id='busca' placeholder='Buscar histórico...' style='margin-bottom:10px'><div class='row'><div class='small'>Orçamentos salvos</div><button onclick='limparSalvos()' style='padding:8px 10px;border:none;border-radius:10px;background:#ff453a;color:#fff'>Limpar tudo</button></div><div id='lista'></div></div><div class='footer'><span id='ver'></span></div><div id='modal' style='display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9998;align-items:center;justify-content:center;padding:20px'><div style='width:100%;max-width:380px;background:#1c1c1e;border-radius:24px;padding:16px'><div id='mtitulo' style='font-weight:700;font-size:18px;margin-bottom:10px'></div><input id='m1' placeholder='' style='margin-bottom:10px'><input id='m2' placeholder='' style='margin-bottom:12px'><div class='btns'><button class='btn alt' onclick='fecharModal()'>Cancelar</button><button class='btn green' onclick='salvarModal()'>Salvar</button></div></div></div>
</div>
<script>
const APP_VERSION = '2.3 Stable';table';
const ids=['fil','g','h','w','k','d','o','l'];
document.addEventListener('change',e=>{if(e.target.id==='perfilFil')document.getElementById('fil').value=e.target.value;if(e.target.id==='perfilImp')document.getElementById('w').value=e.target.value;calc();});
function carregarPerfis(){let fs=JSON.parse(localStorage.getItem('fils')||'[{"n":"PLA Padrão","v":"99"},{"n":"PETG","v":"129"},{"n":"ABS","v":"149"}]');let ps=JSON.parse(localStorage.getItem('imps')||'[{"n":"A1 Mini","v":"65"},{"n":"Ender 3","v":"120"},{"n":"K1","v":"250"}]');perfilFil.innerHTML=fs.map(x=>`<option value='${x.v}'>${x.n} - R$${x.v}</option>`).join('');perfilImp.innerHTML=ps.map(x=>`<option value='${x.v}'>${x.n} - ${x.v}W</option>`).join('');}
function abrirModal(tipo){window.modalTipo=tipo;modal.style.display='flex';m1.value='';m2.value='';if(tipo==='fil'){mtitulo.textContent='Novo Filamento';m1.placeholder='Nome';m2.placeholder='Valor';}else{mtitulo.textContent='Nova Impressora';m1.placeholder='Modelo';m2.placeholder='Consumo em watts';}m1.focus();}
function fecharModal(){modal.style.display='none';}
function salvarModal(){let a=m1.value.trim(),b=m2.value.trim();if(!a||!b)return alert('Preencha todos os campos');if(window.modalTipo==='fil'){let fs=JSON.parse(localStorage.getItem('fils')||'[]');fs.push({n:a,v:b});localStorage.setItem('fils',JSON.stringify(fs));}else{let ps=JSON.parse(localStorage.getItem('imps')||'[]');ps.push({n:a,v:b});localStorage.setItem('imps',JSON.stringify(ps));}carregarPerfis();fecharModal();}
function novoFilamento(){abrirModal('fil');}
function novaImpressora(){abrirModal('ifunction gerirFilamentos(){let fs=JSON.parse(localStorage.getItem('fils')||'[]');let txt='Filamentos cadastrados:\n';for(let i=0;i<fs.length;i++){txt+=(i+1)+'. '+fs[i].n+' - R$'+fs[i].v+'\n';}let n=prompt(txt+'\nDigite número para excluir:');if(!n)return;let idx=parseInt(n)-1;if(idx>=0&&idx<fs.length){fs.splice(idx,1);localStorage.setItem('fils',JSON.stringify(fs));carregarPerfis();}}ifunction gerirImpressoras(){let ps=JSON.parse(localStorage.getItem('imps')||'[]');let txt='Impressoras cadastradas:\n';for(let i=0;i<ps.length;i++){txt+=(i+1)+'. '+ps[i].n+' - '+ps[i].v+'W\n';}let n=prompt(txt+'\nDigite número para excluir:');if(!n)return;let idx=parseInt(n)-1;if(idx>=0&&idx<ps.length){ps.splice(idx,1);localStorage.setItem('imps',JSON.stringify(ps));carregarPerfis();}}ingify(ps));carregarPerfis();}}
function v(id){return Math.max(0,parseFloat(document.getElementById(id).value)||0)}
document.addEventListener('DOMContentLoaded',()=>{const el=document.getElementById('ver');if(el)el.textContent='Versão: '+APP_VERSION;});
function br(n){return n.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
function calc(){let fil=v('fil'),g=v('g'),h=v('h'),w=v('w'),k=v('k'),d=v('d'),o=v('o'),l=v('l');let cf=(fil/1000)*g;let ce=(w/1000)*h*k;let cd=h*d;let total=cf+ce+cd+o;let final=total+(total*l/100);let lucro=final-total;window.last={cf,ce,cd,total,final,lucro};document.getElementById('res').innerHTML=`<div class='result'><span>Filamento</span><b>${br(cf)}</b></div><div class='result'><span>Energia</span><b>${br(ce)}</b></div><div class='result'><span>Depreciação</span><b>${br(cd)}</b></div><div class='result'><span>Outros custos</span><b>${br(o)}</b></div><div class='result'><span>Custo total</span><b>${br(total)}</b></div><div class='result'><span>Venda sugerida</span><b>${br(final)}</b></div><div class='result'><span>Lucro</span><b style='color:#30d158'>${br(lucro)}</b></div>`;document.getElementById('heroTotal').textContent=br(final);localStorage.setItem('defaults',JSON.stringify(Object.fromEntries(ids.map(i=>[i,document.getElementById(i).value]))));}
function limpar(){document.querySelectorAll('input').forEach(x=>x.value='');document.getElementById('fil').value=99;document.getElementById('w').value=65;document.getElementById('k').value=.72;document.getElementById('d').value=.5;document.getElementById('o').value=0;document.getElementById('l').value=200;calc()}
function salvar(){calc();let nome=document.getElementById('nome').value.trim();if(!nome){alert('Informe o nome da peça');return;}let arr=JSON.parse(localStorage.getItem('orc')||'[]');arr.unshift({nome,data:new Date().toLocaleString('pt-BR'),vals:Object.fromEntries(ids.map(i=>[i,document.getElementById(i).value])),nomev:nome,...last});localStorage.setItem('orc',JSON.stringify(arr));render()}
function render(){let arr=JSON.parse(localStorage.getItem('orc')||'[]');let q=(document.getElementById('busca')?.value||'').toLowerCase();arr=arr.filter(x=>(x.nome+' '+(x.cliente||'')).toLowerCase().includes(q));lista.innerHTML=arr.map((x,i)=>`<div class='item'><div class='row'><b>${x.nome}</b><span class='small'>${x.data}</span></div><div class='small'><div class='small'>Total ${br(x.total)} • Venda ${br(x.final)}</div><div class='mini'><button onclick='carregar(${i})'>Carregar</button><button onclick='del(${i})' style='background:#ff453a;color:#fff'>Excluir</button></div></div>`).join('')||"<div class='small'>Nenhum orçamento salvo</div>"}
function carregar(i){let x=JSON.parse(localStorage.getItem('orc'))[i];document.getElementById('nome').value=x.nome;ids.forEach(id=>document.getElementById(id).value=x.vals[id]);calc()}
function limparSalvos(){if(confirm('Apagar todos os orçamentos?')){localStorage.removeItem('orc');render()}}
function del(i){let arr=JSON.parse(localStorage.getItem('orc'));arr.splice(i,1);localStorage.setItem('orc',JSON.stringify(arr));render()}
(function init(){let d=JSON.parse(localStorage.getItem('defaults')||'{}');ids.forEach(i=>{if(d[i]!=null)document.try{carregarPerfis();}catch(e){console.log(e)}calc();render();rregarPerfis();calc();render();document.querySelectorAll('input').forEach(el=>el.oninput=()=>{if(el.id==='fil'||el.id==='k'||el.id==='d'||el.id==='o'){let v=el.value.replace(',','.');el.value=v;}calc();if(el.id==='busca')render();})})();
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}
window.addEventListener('load',()=>{setTimeout(()=>{const s=document.getElementById('splash');if(s){s.style.opacity='0';setTimeout(()=>s.remove(),650)}},1200)});
</script></body></html>
